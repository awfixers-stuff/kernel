name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-action@stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-action@stable
        with:
          toolchain: nightly
          components: clippy, rust-src

      - name: Run clippy
        run: |
          export RUST_TARGET_PATH="${PWD}/targets"
          export RUSTFLAGS="-C soft-float -C debuginfo=2"
          cargo clippy --lib --release --target x86_64-unknown-none -- -D warnings
        continue-on-error: true

  build:
    name: Build (${{ matrix.arch }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [fmt]
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, i686, aarch64, riscv64]
        include:
          - arch: x86_64
            target: x86_64-unknown
            gnu_target: x86_64-unknown-linux-gnu
          - arch: i686
            target: i686-unknown
            gnu_target: i686-unknown-linux-gnu
          - arch: aarch64
            target: aarch64-unknown
            gnu_target: aarch64-unknown-linux-gnu
          - arch: riscv64
            target: riscv64-unknown
            gnu_target: riscv64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-action@stable
        with:
          toolchain: nightly
          components: rust-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Install cross-compilation toolchain
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          case "${ARCH}" in
            x86_64)
              sudo apt-get install -y binutils
              ;;
            i686)
              sudo apt-get install -y gcc-multilib binutils
              ;;
            aarch64)
              sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
              ;;
            riscv64)
              sudo apt-get install -y gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu
              ;;
          esac

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.arch }}-

      - name: Build kernel
        env:
          ARCH: ${{ matrix.arch }}
          GNU_TARGET: ${{ matrix.gnu_target }}
        run: |
          mkdir -p "target/${ARCH}"
          export RUST_TARGET_PATH="${PWD}/targets"

          # Build the kernel using cargo directly
          cargo rustc \
            --bin kernel \
            --manifest-path Cargo.toml \
            --target "targets/${ARCH}-unknown-kernel.json" \
            --release \
            -Z build-std=core,alloc \
            -- \
            -C link-arg=-T \
            -C "link-arg=linkers/${ARCH}.ld" \
            -C link-arg=-z \
            -C link-arg=max-page-size=0x1000

          # Copy artifacts
          cp "target/${ARCH}-unknown-kernel/release/kernel" "target/${ARCH}/kernel.all" || true

          # Create stripped versions using available objcopy
          if command -v "${GNU_TARGET}-objcopy" &> /dev/null; then
            OBJCOPY="${GNU_TARGET}-objcopy"
          elif command -v llvm-objcopy &> /dev/null; then
            OBJCOPY="llvm-objcopy"
          else
            OBJCOPY="objcopy"
          fi

          if [ -f "target/${ARCH}/kernel.all" ]; then
            ${OBJCOPY} --only-keep-debug "target/${ARCH}/kernel.all" "target/${ARCH}/kernel.sym" || true
            ${OBJCOPY} --strip-debug "target/${ARCH}/kernel.all" "target/${ARCH}/kernel" || true
          fi

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kernel-${{ matrix.arch }}
          path: |
            target/${{ matrix.arch }}/kernel
            target/${{ matrix.arch }}/kernel.sym
            target/${{ matrix.arch }}/kernel.all
          if-no-files-found: warn

  test:
    name: Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [fmt]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-action@stable
        with:
          toolchain: nightly
          components: rust-src

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          export RUST_TARGET_PATH="${PWD}/targets"
          cargo test --lib --target x86_64-unknown-linux-gnu || echo "Tests completed with warnings"
        continue-on-error: true

  docs:
    name: Documentation
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-action@stable
        with:
          toolchain: nightly
          components: rust-src

      - name: Build documentation
        run: |
          export RUST_TARGET_PATH="${PWD}/targets"
          cargo doc --no-deps --target x86_64-unknown-none || echo "Doc build completed"
        continue-on-error: true
